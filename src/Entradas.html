    <!-- Script para inyectar las misiones dinámicamente -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Recuperar y mostrar el oro en la navbar al cargar la página
            const userGold = localStorage.getItem('user_gold') || 0;
            document.getElementById('oro-display').textContent = userGold;

            fetch('../api/misiones.php')
                .then(response => response.json())
                .then(res => {
                    const tablon = document.getElementById('tablon-misiones');
                    if (res.status === 'success') {
                        const misiones = res.data;
                        if (misiones.length === 0) {
                            tablon.innerHTML = '<p class="text-center">No hay misiones disponibles por ahora.</p>';
                            return;
                        }
                        
                        misiones.forEach((mision) => {
                            const article = document.createElement('article');
                            article.className = 'col-sm-6 col-md-4 ms-2 mb-3';
                            article.innerHTML = `
                                <div class="card-1 shadow p-3 mb-5 bg-white text-center h-100">
                                    <div class="card-body d-flex flex-column">
                                        <h5 class="card-title text-center">${mision.titulo}</h5>
                                        <div class="mb-3 mt-3">
                                            <span class="badge fw-bold" style="background-color: var(--accent-gold); color: var(--text-main); font-size: 0.95rem;">
                                                Recompensa: ${mision.recompensa_gold} <i class="bi bi-coin"></i>
                                            </span>
                                        </div>
                                        <p class="card-text flex-grow-1">${mision.descripcion}</p>
                                        <a href="#" class="btn mt-auto text-white fw-bold shadow-sm" style="background-color: var(--btn-brown); border: none;">Aceptar misión</a>
                                    </div>
                                </div>
                            `;
                            tablon.appendChild(article);
                        });
                    } else {
                        tablon.innerHTML = `<p class="text-center text-danger">Error: ${res.message}</p>`;
                    }
                })
                .catch(error => {
                    console.error('Error fetching misiones:', error);
                    document.getElementById('tablon-misiones').innerHTML = '<p class="text-center text-danger">Error de conexión con el servidor.</p>';
                });
        });
    </script>
