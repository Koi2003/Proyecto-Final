    <main class="container mt-5 mb-5">
        <h2 class="text-center mb-4">Publicar Nueva Misión</h2>
        
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card-1 bg-white shadow p-3 mb-5">
                    <div class="card-body">
                        <form id="formCrearMision">
                            <div class="mb-3">
                                <label for="titulo" class="form-label">Título de la misión</label>
                                <input type="text" class="form-control" id="titulo" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="descripcion" class="form-label">Descripción</label>
                                <textarea class="form-control" id="descripcion" rows="3" required></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="recompensa" class="form-label">Recompensa (Oro)</label>
                                <input type="number" class="form-control" id="recompensa" min="1" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Ubicación (Haz clic en el mapa para marcarla)</label>
                                <div id="mapa-mision"></div>
                                <small class="text-muted" id="coord-text">Por favor, selecciona una ubicación en el mapa.</small>
                            </div>
                            
                            <input type="hidden" id="latitud" required>
                            <input type="hidden" id="longitud" required>
                            
                            <div id="mensaje-feedback" class="alert d-none" role="alert"></div>

                            <button type="submit" class="btn w-100 fw-bold shadow text-white" style="background-color: var(--accent-green);">Publicar Misión</button>
                        </form>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const map = L.map('mapa-mision').setView([40.4168, -3.7038], 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            let marker = null;

            map.on('click', function(e) {
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;
                document.getElementById('latitud').value = lat;
                document.getElementById('longitud').value = lng;
                
                document.getElementById('coord-text').textContent = `Coordenadas seleccionadas: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                document.getElementById('coord-text').classList.replace('text-muted', 'text-success');

                if (marker) {
                    marker.setLatLng(e.latlng);
                } else {
                    marker = L.marker(e.latlng).addTo(map);
                }
            });

            // 2. Manejo del Formulario
            document.getElementById('formCrearMision').addEventListener('submit', function(e) {
                e.preventDefault(); // Prevenir recarga
                
                const latitud = document.getElementById('latitud').value;
                const longitud = document.getElementById('longitud').value;
                const feedback = document.getElementById('mensaje-feedback');
                
                if (!latitud || !longitud) {
                    feedback.className = 'alert alert-danger mt-3';
                    feedback.textContent = 'Debes seleccionar una ubicación en el mapa haciendo clic sobre él.';
                    feedback.classList.remove('d-none');
                    return;
                }
                
                const misionData = {
                    titulo: document.getElementById('titulo').value,
                    descripcion: document.getElementById('descripcion').value,
                    recompensa_gold: parseInt(document.getElementById('recompensa').value),
                    latitud: parseFloat(latitud),
                    longitud: parseFloat(longitud),
                    creador_id: 1
                };
                
                fetch('../api/crear_mision.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(misionData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        feedback.className = 'alert alert-success mt-3';
                        feedback.textContent = '¡Misión creada exitosamente! Redirigiendo...';
                        feedback.classList.remove('d-none');
                        
                        setTimeout(() => {
                            window.location.href = 'Entradas.html';
                        }, 1500);
                    } else {
                        feedback.className = 'alert alert-danger mt-3';
                        feedback.textContent = 'Error: ' + data.message;
                        feedback.classList.remove('d-none');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    feedback.className = 'alert alert-danger mt-3';
                    feedback.textContent = 'Error de conexión con el servidor.';
                    feedback.classList.remove('d-none');
                });
            });
        });
    </script>
